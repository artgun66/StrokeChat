<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StrokeChat</title>
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0d1520; color: #e6edf3; gap: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      .dot {
        width: 16px; height: 16px; border-radius: 50%;
        background: linear-gradient(135deg, #5b9bd5, #2a4160);
        box-shadow: 0 0 26px rgba(91,155,213,0.55);
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:.4;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }
      h1 { font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
      p { font-size: 12px; color: #8b98a5; margin: 0; }
    </style>
  </head>
  <body>
    <div class="dot"></div>
    <h1>StrokeChat</h1>
    <p>Starting your private models…</p>
  </body>
</html>
