name: desktop-build

on:
  workflow_dispatch:
    inputs:
      skip_models:
        description: "Skip multi-GB model download"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
            artifact_glob: "**/*.dmg"
          - os: macos-13
            platform: mac-x64
            artifact_glob: "**/*.dmg"
          - os: windows-latest
            platform: win-x64
            artifact_glob: "**/*-setup.exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5

      - name: Provision llama-server binary
        shell: bash
        run: |
          mkdir -p desktop/staged/bin/${{ matrix.platform }}

      - name: Stage resources
        shell: bash
        env:
          SKIP_MODELS: ${{ inputs.skip_models && '1' || '0' }}
        run: cd desktop && ./scripts/stage-resources.sh

      - name: Build installer (Tauri)
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.WINDOWS_CERTIFICATE }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: cd desktop && npm install && npm run build

      # Rename to fixed platform filenames (no version in name so /releases/latest/download/ links never break)
      - name: Rename artifacts
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == win-* ]]; then
            find desktop/src-tauri/target/release/bundle -name "*-setup.exe" \
              -exec cp {} "StrokeAssistant-${{ matrix.platform }}-setup.exe" \;
          else
            find desktop/src-tauri/target/release/bundle -name "*.dmg" \
              -exec cp {} "StrokeAssistant-${{ matrix.platform }}.dmg" \;
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            StrokeAssistant-${{ matrix.platform }}.dmg
            StrokeAssistant-${{ matrix.platform }}-setup.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: dist/

      - name: List built installers
        run: ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: dist/*
          generate_release_notes: true
