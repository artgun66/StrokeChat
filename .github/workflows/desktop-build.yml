name: desktop-build

on:
  workflow_dispatch:
    inputs:
      skip_models:
        description: "Skip multi-GB model download"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
          - os: macos-13
            platform: mac-x64
          - os: windows-latest
            platform: win-x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5

      - name: Install frontend dependencies
        shell: bash
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Provision llama-server binary
        shell: bash
        run: |
          mkdir -p desktop/staged/bin/${{ matrix.platform }}

      - name: Stage resources
        shell: bash
        env:
          SKIP_MODELS: ${{ inputs.skip_models != false && '1' || '0' }}
        run: cd desktop && ./scripts/stage-resources.sh

      - name: Build installer (Tauri)
        shell: bash
        run: |
          # Unsigned builds. The configured signing secrets are currently invalid,
          # and Tauri aborts (or hangs at an interactive keychain prompt) trying to
          # import a bad certificate — which is what blocked every prior release.
          # We deliberately do NOT export any APPLE_*/TAURI_SIGNING_* vars, so Tauri
          # produces an unsigned .dmg / .exe. Re-introduce the signing env here once
          # valid Apple + Windows certificates are stored as repo secrets.
          cd desktop && npm install && npm run build

      # Rename to fixed platform filenames (no version in name so /releases/latest/download/ links never break)
      - name: Rename artifacts
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == win-* ]]; then
            find desktop/src-tauri/target/release/bundle -name "*-setup.exe" \
              -exec cp {} "StrokeChat-${{ matrix.platform }}-setup.exe" \;
          else
            find desktop/src-tauri/target/release/bundle -name "*.dmg" \
              -exec cp {} "StrokeChat-${{ matrix.platform }}.dmg" \;
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            StrokeChat-${{ matrix.platform }}.dmg
            StrokeChat-${{ matrix.platform }}-setup.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    # Run even if some platform builds failed, so the platforms that DID build still
    # ship. `needs: build` normally requires every matrix job to succeed; always()
    # overrides that. We still gate on tag/dispatch so unrelated pushes don't release.
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: dist/

      - name: List built installers
        run: ls -lh dist/ || (echo "No installers were produced by any platform" && exit 1)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
          draft: false
          # NOT a prerelease, and mark as the repo's latest release. GitHub's
          # /releases/latest/download/ links (used by the home page) only ever
          # resolve to a full, latest-marked release — a prerelease 404s. That flag
          # being true is why the download buttons never worked.
          prerelease: false
          make_latest: true
          files: dist/*
          generate_release_notes: true
