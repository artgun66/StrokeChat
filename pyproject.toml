[tool.uv.workspace]
members = ["backend"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [".venv", "node_modules", "data"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ", "S"]
ignore = ["S101", "DJ001"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S"]
"**/test_*.py" = ["S"]
"**/migrations/**" = ["E", "F", "I"]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
exclude = ["migrations/", "node_modules/", "\\.venv"]
