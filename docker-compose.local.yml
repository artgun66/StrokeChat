services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: local_llm
      POSTGRES_PASSWORD: local_llm
      POSTGRES_DB: local_llm
    ports:
      - "55432:5432"  # host:container — natively-running backend connects via localhost:55432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_llm"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The backend + worker services that used to live here are now started natively on
  # the host by `./scripts/dev.sh start` so chat uses Apple Silicon Metal acceleration.
  # See backend/Dockerfile.runtime for the on-prem image build (used in real deploys).

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      # Backend runs natively on the Mac host (for Metal-accelerated llama.cpp).
      # NEXT_PUBLIC_API_URL is read by the *browser*, so localhost = the host.
      # API_URL is read by RSC inside this container, so it must use host.docker.internal.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://host.docker.internal:8000
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend:/app
    command: ["sh", "-c", "corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter product dev"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  backend_data:
